# ESPHome configuration for M5S-0005
# Copyright © Stephen Irons 2026

# Hardware
# * M5Stack
# * Relay base


substitutions:
  device_id: m5s-0005
  device_name: M5S-0005
  device_manufacturer: Ironspark
  device_part_number: 99-9001-0012-00
  device_model: M5RELAY-1
  device_serial: 99-9001-0005
  device_uart: "/dev/serial/by-id/usb-Silicon_Labs_CP2104_USB_to_UART_Bridge_Controller_01BB98C0-if00-port0"
  device_ipaddr: "192.168.1.125"
  device_hostname: m5s-0005.local
  device_uuid: db3fc64b-6dab-4623-a621-32026a754518

  ha_api_key: !secret m5s-0005-ha_api_key
  ota_password: !secret m5s-0005-ota_password
  ap_ssid: !secret m5s-0005-ap_ssid
  ap_psk: !secret m5s-0005-ap_psk
  tb_api_key: !secret m5s-0005-tb_api_key


esphome:
  name: ${device_id}
  friendly_name: ${device_name}
  on_boot:
    then:
      - output.turn_on:
          id: lcd_bl

      - output.set_level:
          id: lcd_bl
          level: 100%


esp32:
  board: m5stack-core-esp32
  framework:
    type: esp-idf


api:
  encryption:
    key: ${ha_api_key}


ota:
  - platform: esphome
    password: ${ota_password}


logger:


packages:
  m5core: !include
    file: hw/m5stack-core.yaml
    vars:
      invert_colors: false

  firmware_details: !include
    file: shared/firmware_details.yaml

  common: !include
    file: shared/debug-heap.yaml

  wifi: !include
    file: shared/wifi.yaml

  m5base: !include
    file: hw/m5stack-relay.yaml

  fonts: !include
    file: fonts/fonts-m5stack.yaml


wifi:
  ap:
    ssid: ${ap_ssid}
    password: ${ap_psk}

  on_connect:
    then:
      - lvgl.label.update:
          id: page_wifi_value_state
          text: "Connected"

  on_disconnect:
    then:
      - lvgl.label.update:
          id: page_wifi_value_state
          text: "Disconnected"
      - lvgl.label.update:
          id: page_wifi_value_ssid
          text: " "
      - lvgl.label.update:
          id: page_wifi_value_rssi
          text: "--"
      - lvgl.label.update:
          id: page_wifi_value_ipaddr
          text: " "


binary_sensor:
  - id: !extend btn_A
    on_press:
      then:
        - output.turn_on: rly_A
    on_release:
      then:
        - output.turn_off: rly_A

  - id: !extend btn_B
    on_press:
      then:
        - output.turn_on: rly_B
    on_release:
      then:
        - output.turn_off: rly_B

  - id: !extend btn_C
    on_press:
      then:
        - lvgl.page.next:


sensor:
  - platform: internal_temperature
    id: internal_temperature_C
    name: "Internal Temperature"
    update_interval: 15s
    on_value:
      then:
        - lvgl.label.update:
            id: page_environment_value_temperature
            text:
              format: "%.1f"
              args:
                - x

  - platform: debug
    loop_time:
      id: loop_time_ms
      name: "Loop time"
      on_value:
        then:
          - lvgl.label.update:
              id: page_diag_value_loop_time
              text:
                format: "%.1f"
                args:
                  - x

  - id: !extend uptime_s
    on_value:
      then:
        - lvgl.label.update:
            id: page_diag_value_uptime
            text:
              format: "%.1f"
              args:
                - 'x / 3600.0'

  - id: !extend bootcount
    on_value:
      then:
        - lvgl.label.update:
            id: page_diag_value_bootcount
            text:
              format: "%.0f"
              args:
                - x

  - platform: wifi_signal
    id: wifi_level_dBm
    name: "WiFi level"
    update_interval: 15s
    on_value:
      then:
        - lvgl.label.update:
            id: page_wifi_value_rssi
            text:
              format: "%.1f"
              args:
                - x


text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP address"
      on_value:
        then:
          - lvgl.label.update:
              id: page_wifi_value_ipaddr
              text:
                format: "%s"
                args:
                  - x.c_str()

    ssid:
      name: "SSID"
      on_value:
        then:
          - lvgl.label.update:
              id: page_wifi_value_ssid
              text:
                format: "%s"
                args:
                  - x.c_str()

    mac_address:
      name: "MAC"
      on_value:
        then:
          - lvgl.label.update:
              id: page_wifi_value_macaddr
              text:
                format: "%s"
                args:
                  - x.c_str()

  - id: !extend firmware_version
    on_value:
      then:
        - lvgl.label.update:
            id: page_firmware_value_firmware
            text:
              format: "%s"
              args:
                - x.c_str()

  - id: !extend build_ulid
    on_value:
      then:
        - lvgl.label.update:
            id: page_firmware_value_build_ulid
            text:
              format: "%s"
              args:
                - x.c_str()

  - id: !extend esphome_version
    on_value:
      then:
        - lvgl.label.update:
            id: page_firmware_value_esphome_version
            text:
              format: "%s"
              args:
                - x.c_str()


time:
  - platform: homeassistant
    id: ha_time


lvgl:
  displays:
    - disp_A
  buffer_size: 8%
  pages:
    - !include
        file: pages-lvgl/page-wifi.yaml
        vars:
          page_id: page_wifi
          page_title: "Wi-Fi"

    - !include
        file: pages-lvgl/page-diag.yaml
        vars:
          page_id: page_diag
          page_title: "Diagnostics"

    - !include
        file: pages-lvgl/page-environment.yaml
        vars:
          page_id: page_environment
          page_title: "Environment"

    - !include
        file: pages-lvgl/page-firmware.yaml
        vars:
          page_id: page_firmware
          page_title: "Firmware"

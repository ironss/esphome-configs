

host:


binary_sensor:
  - platform: sdl
    id: btn_A
    key: SDLK_1

  - platform: sdl
    id: btn_B
    key: SDLK_2

  - platform: sdl
    id: btn_C
    key: SDLK_3


sensor:
  - platform: template
    id: battery_level_pc
    name: "Battery Level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    id: internal_temperature_C


text_sensor:
  - platform: template
    name: "IP address"
    id: wifi_ipaddr
    update_interval: never
    lambda: 'return {"127.0.0.1"};'

  - platform: template
    name: "SSID"
    id: wifi_ssid
    update_interval: never
    lambda: 'return {"(host)"};'

  - platform: template
    name: "MAC"
    id: wifi_mac
    update_interval: never
    lambda: 'return {"00:00:00:00:00:00"};'


display:
  - platform: sdl
    id: disp_A
    # show_test_card: true
    dimensions:
      width: ${display_width}
      height: ${display_height}
    window_options:
      resizable: true

id: ${page_id}
lambda: |-
  it.printf(${col_label}, ${row_heading}, id(heading), TextAlign::BASELINE_LEFT, "${page_title}");

  it.printf(${col_label}, ${row_text1}, id(text_normal), TextAlign::BASELINE_LEFT, "SSID");
  it.printf(${col_value}, ${row_text1}, id(text_bold), TextAlign::BASELINE_RIGHT, "%s", id(wifi_ssid).state.c_str());
  it.printf(${col_unit} , ${row_text1}, id(text_normal), TextAlign::BASELINE_LEFT, " ");

  it.printf(${col_label}, ${row_text2}, id(text_normal), TextAlign::BASELINE_LEFT, "RSSI");
  it.printf(${col_value}, ${row_text2}, id(text_bold), TextAlign::BASELINE_RIGHT, "%.1f", id(wifi_level_dBm).state);
  it.printf(${col_unit} , ${row_text2}, id(text_normal), TextAlign::BASELINE_LEFT, "dBm");

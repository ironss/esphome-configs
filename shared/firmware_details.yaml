# ESPHome configuration: shared firmware details
# Copyright © Stephen Irons 2026


esphome:
  includes:
    - vc_version.h
    - build_details.h

  on_boot:
    then:
      - lambda: |-
          id(g_bootcount) += 1;
          id(bootcount).publish_state(id(g_bootcount));

      - lambda: |-
          id(firmware_version).publish_state(FW_VERSION);
          id(build_ulid).publish_state(BUILD_ULID);


globals:
  - id: g_bootcount
    type: int
    initial_value: '0'
    restore_value: yes


sensor:
  - platform: uptime
    id: uptime_s
    type: seconds
    name: Uptime Sensor

  - platform: template
    id: bootcount
    name: "Bootcount"
    entity_category: diagnostic
    lambda: |-
      return id(g_bootcount);
    accuracy_decimals: 0
    update_interval: never


text_sensor:
  - platform: template
    id: firmware_version
    name: "Firmware version"
    entity_category: diagnostic

  - platform: template
    id: build_ulid
    name: "Build ULID"
    entity_category: diagnostic

  - platform: version
    id: esphome_version
    name: "ESPHome version"
    entity_category: diagnostic

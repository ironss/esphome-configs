# ESPHome configuration for M5C-0003
# Copyright © Stephen Irons 2026

# Hardware
# * M5Stick-C


substitutions:
  device_id: m5c-0003
  device_name: M5C-0003
  device_manufacturer: Ironspark
  device_part_number: 99-9001-0004-00
  device_model: M5Stick-C
  device_serial: 99-9001-0003
  device_uart: "/dev/serial/by-id/usb-Kongou_Hikari_M5Stack_Intf_4152A0BD45-if00-port0"
  device_ipaddr: "192.168.1.123"
  device_hostname: m5c-0003.local
  device_uuid: 1dea6250-1f83-4351-8ecc-1b40b4ab219d

  ha_api_key: !secret m5c-0003-ha_api_key
  ota_password: !secret m5c-0003-ota_password
  ap_ssid: !secret m5c-0003-ap_ssid
  ap_psk: !secret m5c-0003-ap_psk
  tb_api_key: !secret m5c-0003-tb_api_key


esphome:
  name: ${device_id}
  friendly_name: ${device_name}
  platformio_options:
    upload_speed: 750000


esp32:
  board: m5stick-c
  framework:
    # External component axp192 requires arduino framework
    type: arduino


api:
  encryption:
    key: ${ha_api_key}


ota:
  - platform: esphome
    password: ${ota_password}


logger:


packages:
  core_hw: !include
    file: hw/m5stick-c.yaml

  firmware_details: !include
    file: shared/firmware_details.yaml

  common: !include
    file: shared/debug-heap.yaml

  wifi: !include
    file: shared/wifi.yaml

  fonts: !include
    file: fonts/fonts-m5stick.yaml


wifi:
  ap:
    ssid: ${ap_ssid}
    password: ${ap_psk}


script:
  - id: auto_advance_page
    mode: restart
    then:
      - delay: 10s
      - display.page.show_next: disp_A
      - component.update: disp_A


binary_sensor:
  - id: !extend btn_A
    on_press:
      then:
        - light.toggle: light1

  - id: !extend btn_B
    on_press:
      then:
        - light.turn_on: light1
        - display.page.show_next: disp_A
        - component.update: disp_A
        - script.execute: auto_advance_page

    on_release:
      then:
        - light.turn_off: light1


light:
  - platform: monochromatic
    id: light1
    name: LED
    output: led1


time:
  - platform: homeassistant
    id: ha_time


display:
  - id: !extend disp_A
    pages:
      - !include
          file: pages-simple/page-diag.yaml
          vars:
            page_id: page_diag
            page_title: "Diagnostics"

      - !include
          file: pages-simple/page-wifi.yaml
          vars:
            page_id: page_wifi
            page_title: "Wi-Fi"

      - !include
          file: pages-simple/page-test.yaml
          vars:
            page_id: page_test
            page_title: "Text test page"
            test_text: "AGKMQRWXadibegjmqptwy"

      - !include
          file: pages-simple/page-firmware.yaml
          vars:
            page_id: page_firmware
            page_title: "Firmware"


interval:
  - interval: 15s
    then:
      - script.execute: auto_advance_page


sensor:
  - platform: internal_temperature
    id: internal_temperature_C
    name: "Internal Temperature"
    update_interval: 15s

  - platform: wifi_signal
    id: wifi_level_dBm
    name: "WiFi level"
    update_interval: 15s


text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP address"
      id: wifi_ipaddr

    ssid:
      name: "SSID"
      id: wifi_ssid

    mac_address:
      name: "MAC"
      id: wifi_mac
